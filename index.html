<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ingresar — LillyTech Solution Portfolio Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,500&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="login-shell">
    <div class="login-card">
      <div class="login-mark">LillyTech</div>
      <div class="login-sub">Solution Portfolio Manager</div>

      <div id="login-error" class="form-error hidden" role="alert"></div>

      <form id="login-form" novalidate>
        <div class="field-group">
          <label for="email">Correo</label>
          <input class="input" type="email" id="email" name="email" autocomplete="username" required />
        </div>
        <div class="field-group">
          <label for="password">Contraseña</label>
          <input class="input" type="password" id="password" name="password" autocomplete="current-password" required />
        </div>
        <button type="submit" id="login-submit" class="btn btn-primary login-submit">Ingresar</button>
      </form>
    </div>
  </div>

  <script type="module">
    import { supabase } from './js/supabase-client.js';

    const form = document.getElementById('login-form');
    const errorBox = document.getElementById('login-error');
    const submitBtn = document.getElementById('login-submit');

    // Si ya hay una sesión activa, saltar directo al panel principal.
    supabase.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'dashboard.html';
    });

    function showError(message) {
      errorBox.textContent = message;
      errorBox.classList.remove('hidden');
    }

    function translateAuthError(message) {
      if (!message) return 'No se pudo iniciar sesión. Intenta de nuevo.';
      if (message.includes('Invalid login credentials')) {
        return 'Correo o contraseña incorrectos.';
      }
      if (message.includes('Email not confirmed')) {
        return 'Este usuario todavía no confirmó su correo.';
      }
      return 'No se pudo iniciar sesión. Intenta de nuevo.';
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      errorBox.classList.add('hidden');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Ingresando…';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const { error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        showError(translateAuthError(error.message));
        submitBtn.disabled = false;
        submitBtn.textContent = 'Ingresar';
        return;
      }

      window.location.href = 'dashboard.html';
    });
  </script>
</body>
</html>
