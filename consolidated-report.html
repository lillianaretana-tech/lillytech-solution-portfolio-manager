<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reporte consolidado — LillyTech Solution Portfolio Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,500&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header no-print">
      <div class="brand">
        <span class="brand-mark">LillyTech</span>
        <span class="brand-sub">Solution Portfolio Manager</span>
      </div>
      <div class="header-actions">
        <div class="user-chip">
          <span id="user-email">…</span>
          <span id="user-role" class="role-pill">—</span>
        </div>
        <a href="dashboard.html" class="btn btn-ghost">← Volver al panel</a>
      </div>
    </header>

    <main class="main-content">
      <h1 class="no-print">Reporte consolidado</h1>
      <p class="text-muted no-print" style="margin-top:-6px;margin-bottom:20px;">
        Elige qué soluciones incluir y genera un reporte único con portada, índice y una sección completa por cada una.
      </p>

      <div class="selection-panel no-print">
        <div class="toolbar" style="margin-bottom:0;">
          <select class="select" id="filter-category"><option value="">Categoría (todas)</option></select>
          <select class="select" id="filter-doc-status"><option value="">Estado documental (todos)</option></select>
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;font-weight:400;margin:0;">
            <input type="checkbox" id="filter-only-complete" style="width:auto;" /> Solo completas
          </label>
          <div class="toolbar-spacer"></div>
          <button type="button" id="btn-select-all" class="btn btn-ghost btn-sm">Marcar todas (filtradas)</button>
          <button type="button" id="btn-select-none" class="btn btn-ghost btn-sm">Desmarcar todas</button>
        </div>
        <div class="selection-list" id="selection-list"></div>
        <div class="form-actions" style="margin-top:14px;">
          <span id="selection-count" class="text-muted" style="margin-right:auto;font-size:13px;"></span>
          <button type="button" id="btn-generate" class="btn btn-primary" disabled>Generar reporte consolidado</button>
        </div>
      </div>

      <div id="load-error" class="form-error hidden no-print"></div>

      <div id="report-body" class="hidden">
        <div class="report-actions-bar no-print">
          <button id="btn-export-json" class="btn btn-ghost">Descargar JSON</button>
          <button id="btn-print" class="btn btn-brass">Imprimir / Guardar como PDF</button>
        </div>
        <div class="report-page" id="report-content"></div>
      </div>
    </main>
  </div>

  <script type="module" src="js/consolidated-report.js"></script>
</body>
</html>
